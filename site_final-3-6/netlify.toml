[build]
  publish = "."

# Cache aggressively for images (immutable, 1 year)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache HTML for shorter period (so updates propagate quickly)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Ensure WebP is served with correct MIME type
[[headers]]
  for = "/*.webp"
  [headers.values]
    Content-Type = "image/webp"
